<!DOCTYPE html>
<html>
<head>
    <title>Customer Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 750px;
        }

        table, th, td {
            border: 2px solid black;
        }

        th {
            background-color: #e6e6e6;
            padding: 12px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }

        /* Equal height for item rows */
        .item-row {
            height: 60px;
        }
    </style>
</head>
<body>
<table>
    <tr>
        <th>Customer</th>
        <th colspan="3">Items</th>
        <th colspan="2">Payments</th>
    </tr>

    <tr class="item-row">
        <td rowspan="3">Customer Name</td>

        <td>Item1</td>
        <td>5</td>
        <td>$400.00</td>

        <!-- First Payment spans 2 item rows -->
        <td rowspan="2">12 Sep 2018</td>
        <td rowspan="2">$3,000.00</td>
    </tr>

    <tr class="item-row">
        <td>Item2</td>
        <td>10</td>
        <td>$200.00</td>
    </tr>

    <tr class="item-row">
        <td>Item3</td>
        <td>2</td>
        <td>$500.00</td>

        <!-- Second Payment -->
        <td>18 Sep 2018</td>
        <td>$2,000.00</td>
    </tr>
</table>
</body>
</html>
